<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRUS GENERATOR // HY-TECH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=JetBrains+Mono&display=swap');

        :root {
            --bg: #ffffff;
            --panel: #f8f8f8;
            --text: #1d1d1f;
            --sub-text: #86868b;
            --border: #e5e5e5;
            --accent: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* 🎀 キャラクター表示aエリア */
        .mascot-container {
            width: 350px;
            height: 250px;
            margin-bottom: -60px; /* パネルに少し被せる */
            z-index: 0;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            position: relative;
        }

        .mascot-container img {
            width: 100%;
            height: auto;
            image-rendering: pixelated; /* ドットをクッキリさせる */
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.1));
            /* 背景の緑色を馴染ませるためのマスク処理（簡易版） */
            mask-image: radial-gradient(circle, black 70%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle, black 70%, transparent 100%);
        }

        /* ⬜ ジェネレーターパネル（ハイテック・白・灰色） */
        .gen-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            padding: 60px 30px 40px;
            border-radius: 32px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 80px rgba(0,0,0,0.05);
            z-index: 1;
            text-align: center;
            box-sizing: border-box;
        }

        /* 📟 結果画面 */
        #result {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            color: var(--text);
            letter-spacing: -1px;
            line-height: 1.2;
            word-break: break-all;
        }

        /* 🕹️ 操作ボタン */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #fff;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--sub-text);
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .btn-secondary:hover {
            background-color: #f2f2f7;
            color: var(--text);
        }

        button:active {
            transform: scale(0.97);
        }

        /* 通知フラッシュ */
        .toast {
            position: fixed;
            bottom: 40px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="mascot-container">
        <img src="mascot.png" alt="Mascots">
    </div>

    <div class="gen-panel">
        <div id="result">SYSTEM READY</div>
        
        <div class="btn-stack">
            <button class="btn-primary" onclick="generate()">Let’s Grus</button>
            <button class="btn-secondary" onclick="copyText()">Copy</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">TEXT COPIED</div>

<script>
    const dictionary = [
        { t: "Grus", w: 15 }, { t: "Glass", w: 12 }, { t: "グルス", w: 10 },
        { t: "るす", w: 8 }, { t: "Oh", w: 5 }, { t: " ", w: 3 }
    ];

    function generate() {
        let res = "";
        const count = Math.floor(Math.random() * 4) + 4;

        for (let i = 0; i < count; i++) {
            const item = getW();
            let word = item.t;
            // 稀にスライス
            if (word.length > 3 && Math.random() < 0.3) {
                word = word.substring(0, Math.floor(Math.random() * 2) + 1);
            }
            res += word;
            if (Math.random() < 0.5) res += " ";
        }
        
        const el = document.getElementById('result');
        el.style.opacity = 0;
        setTimeout(() => {
            el.innerText = res.trim().toUpperCase();
            el.style.opacity = 1;
        }, 50);
    }

    function getW() {
        const total = dictionary.reduce((s, c) => s + c.w, 0);
        let r = Math.random() * total;
        for (const c of dictionary) {
            if (r < c.w) return c;
            r -= c.w;
        }
        return dictionary[0];
    }

    function copyText() {
        const t = document.getElementById('result').innerText;
        if (t === "SYSTEM READY") return;
        navigator.clipboard.writeText(t);
        const toast = document.getElementById('toast');
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 1500);
    }
</script>

</body>
</html>
